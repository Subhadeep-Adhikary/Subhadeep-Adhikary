<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topFaceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="leftFaceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>

    <linearGradient id="rightFaceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>

    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="15" flood-color="#010409" flood-opacity="0.6"/>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="700" fill="transparent"/>

  <ellipse cx="450" cy="580" rx="190" ry="40" fill="#38bdf8" opacity="0.15" filter="blur(20px)"/>

  <g filter="url(#premiumShadow)">

    <path d="M450 120 L660 225 L450 330 L240 225 Z" 
          fill="url(#topFaceGrad)" 
          stroke="#475569" 
          stroke-width="2" 
          stroke-linejoin="round"/>

    <path d="M240 225 L450 330 L450 550 L240 445 Z" 
          fill="url(#leftFaceGrad)" 
          stroke="#f97316" 
          stroke-width="2" 
          stroke-linejoin="round"/>

    <path d="M660 225 L450 330 L450 550 L660 445 Z" 
          fill="url(#rightFaceGrad)" 
          stroke="#10b981" 
          stroke-width="2" 
          stroke-linejoin="round"/>

    <path d="M450 135 L635 227 L450 320 L265 227 Z" fill="none" stroke="#64748b" stroke-width="1" opacity="0.4"/>
    <path d="M255 237 L440 330 L440 535 L255 442 Z" fill="none" stroke="#f97316" stroke-width="1" opacity="0.3"/>
    <path d="M645 237 L460 330 L460 535 L645 442 Z" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>

    <text x="450" y="232" 
          text-anchor="middle" 
          font-size="40" 
          font-family="'JetBrains Mono', 'Fira Code', 'Segoe UI Mono', monospace" 
          font-weight="800" 
          fill="#f8fafc" 
          letter-spacing="6"
          transform="matrix(1, 0.5, -1, 0.5, 225, -112.5)">
      PROGRAM
    </text>

    <text x="0" y="0" 
          text-anchor="middle" 
          font-size="30" 
          font-family="'JetBrains Mono', 'Fira Code', 'Segoe UI Mono', monospace" 
          font-weight="850" 
          fill="#ffffff" 
          letter-spacing="2"
          filter="url(#textGlow)"
          transform="matrix(0.866, 0.5, 0, 1, 345, 370)">
      DEVELOPMENT
    </text>

    <text x="0" y="0" 
          text-anchor="middle" 
          font-size="38" 
          font-family="'JetBrains Mono', 'Fira Code', 'Segoe UI Mono', monospace" 
          font-weight="850" 
          fill="#ffffff" 
          letter-spacing="4"
          filter="url(#textGlow)"
          transform="matrix(0.866, -0.5, 0, 1, 555, 375)">
      DEBUG
    </text>

    <circle cx="450" cy="330" r="4" fill="#cbd5e1"/>
    
  </g>
</svg>
