<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <g opacity="0.15" transform="translate(950, 200)">
    <circle r="250" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="20 10" />
    <circle r="180" fill="none" stroke="#38bdf8" stroke-width="1.5" />
    <circle r="120" fill="none" stroke="#38bdf8" stroke-width="8" stroke-dasharray="5 30" />
  </g>

  <path d="M 0,200 L 150,200 L 200,250 L 500,250" fill="none" stroke="#0ea5e9" stroke-width="3" filter="url(#neonGlow)" opacity="0.6"/>

  <text x="150" y="190" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="54" fill="url(#textGrad)" letter-spacing="4">SUBHADEEP ADHIKARY</text>
  
  <text x="154" y="240" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="20" fill="#38bdf8" letter-spacing="6" opacity="0.9">FULL-STACK DEVELOPER</text>
  
  <text x="154" y="275" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#f5deb3" letter-spacing="3" opacity="0.7">AI &amp; DATA SCIENCE SPECULATION</text>

  <circle cx="154" cy="115" r="4" fill="#38bdf8" filter="url(#neonGlow)" />
  <line x1="170" y1="115" x2="450" y2="115" stroke="#38bdf8" stroke-width="1" opacity="0.3" />
</svg>
