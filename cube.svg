<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg">

  <defs>

  <!-- Neon Gradients -->
    <linearGradient id="topGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <linearGradient id="leftGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ff8a00"/>
    </linearGradient>

    <linearGradient id="rightGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c026ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="edgeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0047ff"/>
    </linearGradient> -->

    <!-- Glow -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="25" stdDeviation="20" flood-color="#00000055"/>
    </filter>

  </defs>

  <!-- Transparent Background -->
  <rect width="900" height="700" fill="transparent"/>

  <!-- Bottom Shadow -->
  <ellipse cx="450" cy="610" rx="220" ry="60"
           fill="#7c3aed33"
           filter="url(#glow)"/>

  <!-- Main Dice -->
  <g filter="url(#shadow)">

    <!-- Outer Glow Shape -->
    <path d="M450 80
             L690 210
             L690 470
             L450 600
             L210 470
             L210 210 Z"
          fill="url(#edgeGradient)"
          filter="url(#glow)"
          opacity="0.95"/>

    <!-- Top Face -->
    <path d="M450 110
             L650 220
             L450 330
             L250 220 Z"
          fill="url(#topGradient)"
          stroke="#0f62fe"
          stroke-width="5"/>

    <!-- Left Face -->
    <path d="M250 220
             L450 330
             L450 560
             L250 450 Z"
          fill="url(#leftGradient)"
          stroke="#ffd54a"
          stroke-width="5"/>

    <!-- Right Face -->
    <path d="M650 220
             L450 330
             L450 560
             L650 450 Z"
          fill="url(#rightGradient)"
          stroke="#e9d5ff"
          stroke-width="5"/>

    <!-- Inner Neon Border LEFT -->
    <path d="M270 240
             L430 325
             L430 535
             L270 450 Z"
          fill="none"
          stroke="#fff5"
          stroke-width="5"/>

    <!-- Inner Neon Border RIGHT -->
    <path d="M630 240
             L470 325
             L470 535
             L630 450 Z"
          fill="none"
          stroke="#fff5"
          stroke-width="5"/>

    <!-- Inner Neon Border TOP -->
    <path d="M450 135
             L620 225
             L450 315
             L280 225 Z"
          fill="none"
          stroke="#ffffffaa"
          stroke-width="5"/>

    <!-- PROGRAM -->
    <text x="450"
          y="245"
          text-anchor="middle"
          font-size="54"
          font-family="Segoe UI, Arial, sans-serif"
          font-weight="900"
          fill="#0f172a"
          letter-spacing="3">
      PROGRAM
    </text>

    <!-- DEBUG -->
    <text x="340"
          y="420"
          text-anchor="middle"
          font-size="56"
          font-family="Segoe UI, Arial, sans-serif"
          font-weight="900"
          fill="#0f172a"
          transform="rotate(28 340 420)"
          letter-spacing="2">
      DEBUG
    </text>

    <!-- DEPLOY -->
    <text x="560"
          y="420"
          text-anchor="middle"
          font-size="56"
          font-family="Segoe UI, Arial, sans-serif"
          font-weight="900"
          fill="#0f172a"
          transform="rotate(-28 560 420)"
          letter-spacing="2">
      DEPLOY
    </text>

    <!-- Center Shine -->
    <circle cx="450" cy="320" r="10" fill="#ffffff"/>
    <circle cx="450" cy="320" r="25" fill="#ffffff55" filter="url(#glow)"/>

  </g>

</svg>